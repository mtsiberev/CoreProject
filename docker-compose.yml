version: '3.8'

services:
  # База данных PostgreSQL
  db:
    image: postgres:latest
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: my_app_db
    ports:
      - "5432:5432"

  # Брокер сообщений RabbitMQ (с панелью управления)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: my_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Порт для кода
      - "15672:15672" # Порт для браузера (логин/пасс: guest/guest)

  # Кэш Redis
  cache:
    image: redis:latest
    container_name: my_redis
    restart: always
    ports:
      - "6379:6379"
